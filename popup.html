<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * {
      box-sizing: border-box;
    }
    
    body {
      width: 360px;
      padding: 0;
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f5f5;
    }
    
    .container {
      background: white;
      border-radius: 12px;
      margin: 12px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
    
    /* 头部 */
    .header {
      background: linear-gradient(135deg, #f8f7f7 0%, #e4dfdf 100%);
      color: rgb(94, 15, 15);
      padding: 16px 20px;
    }
    
    .header h3 {
      margin: 0;
      font-size: 16px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .header p {
      margin: 8px 0 0 0;
      font-size: 12px;
      opacity: 0.9;
    }
    
    /* 标签页导航 */
    .tabs {
      display: flex;
      border-bottom: 1px solid #eee;
      background: white;
    }
    
    .tab {
      flex: 1;
      text-align: center;
      padding: 12px;
      cursor: pointer;
      font-size: 13px;
      color: #666;
      transition: all 0.2s;
      border-bottom: 2px solid transparent;
    }
    
    .tab.active {
      color: #d43c33;
      border-bottom-color: #d43c33;
    }
    
    .tab:hover {
      background: #f9f9f9;
    }
    
    /* 内容区域 */
    .content {
      padding: 16px 20px;
    }
    
    .tab-content {
      display: none;
    }
    
    .tab-content.active {
      display: block;
    }
    
    
    /* 开关样式 */
    .switch-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px;
      background: #f8f8f8;
      border-radius: 8px;
      margin-bottom: 12px;
    }
    .switch-label {
      font-size: 14px;
      color: #333;
    }
    .switch-desc {
      font-size: 11px;
      color: #999;
      margin-top: 4px;
    }
    .switch {
      position: relative;
      display: inline-block;
      width: 44px;
      height: 24px;
    }
    .switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }
    .slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: #ccc;
      transition: 0.3s;
      border-radius: 24px;
    }
    .slider:before {
      position: absolute;
      content: "";
      height: 18px;
      width: 18px;
      left: 3px;
      bottom: 3px;
      background-color: white;
      transition: 0.3s;
      border-radius: 50%;
    }
    input:checked + .slider {
      background-color: #d43c33;
    }
    input:checked + .slider:before {
      transform: translateX(20px);
    }

    /* 状态卡片 */
    .status-card {
      background: #f8f8f8;
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 16px;
    }
    
    .status-item {
      display: flex;
      justify-content: space-between;
      margin-bottom: 8px;
      font-size: 13px;
    }
    
    .status-item:last-child {
      margin-bottom: 0;
    }
    
    .status-label {
      color: #666;
    }
    
    .status-value {
      font-weight: 500;
      color: #333;
    }
    
    .status-value.success {
      color: #52c41a;
    }
    
    .status-value.error {
      color: #f5222d;
    }
    
    .status-value.warning {
      color: #faad14;
    }
    
    /* 黑名单管理 */
    .add-section {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }
    
    .add-section input {
      flex: 1;
      padding: 10px 12px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 13px;
      outline: none;
      transition: border-color 0.2s;
    }
    
    .add-section input:focus {
      border-color: #d43c33;
    }
    
    .add-section button {
      padding: 10px 16px;
      background: #d43c33;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
      transition: background 0.2s;
    }
    
    .add-section button:hover {
      background: #b03028;
    }
    
    /* 黑名单列表 */
    .blacklist-list {
      max-height: 280px;
      overflow-y: auto;
    }
    
    .blacklist-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 0;
      border-bottom: 1px solid #f0f0f0;
    }
    
    .blacklist-item:last-child {
      border-bottom: none;
    }
    
    .artist-name {
      font-size: 13px;
      color: #333;
    }
    
    .delete-btn {
      background: none;
      border: none;
      color: #999;
      cursor: pointer;
      font-size: 16px;
      padding: 4px 8px;
      transition: color 0.2s;
    }
    
    .delete-btn:hover {
      color: #f5222d;
    }
    
    .empty-tip {
      text-align: center;
      padding: 32px 0;
      color: #999;
      font-size: 13px;
    }
    
    /* 按钮 */
    .action-btn {
      width: 100%;
      padding: 10px;
      background: #eb665f;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
      transition: background 0.2s;
      margin-top: 12px;
    }
    
    .action-btn:hover {
      background: #d14c4c;
    }
    
    .action-btn.primary {
      background: #f0f0f0;
      color: #333;
    }
    
    .action-btn.primary:hover {
      background: #e0e0e0;
    }
    
    /* 日志区域 */
    .log-list {
      max-height: 200px;
      overflow-y: auto;
      font-size: 11px;
      background: #f8f8f8;
      padding: 8px;
      border-radius: 6px;
      margin-top: 12px;
    }
    
    .log-item {
      padding: 6px 0;
      border-bottom: 1px solid #eee;
      color: #666;
      font-size: 11px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    
    .log-item.error {
      color: #f5222d;
    }
    
    .log-item.warning {
      color: #faad14;
    }
    
    .log-item.success {
      color: #52c41a;
    }
    
    .timestamp {
      color: #999;
      margin-right: 6px;
    }
    
    /* 底部 */
    .footer {
      padding: 12px 20px;
      text-align: center;
      font-size: 11px;
      color: #999;
      border-top: 1px solid #eee;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h3>
        <span>🎵 淡出歌单</span>
      </h3>
      <p>自动将跳过的歌曲加入淡出歌单</p>
    </div>
    
    <div class="tabs">
      <div class="tab active" data-tab="status">📊 状态</div>
      <div class="tab" data-tab="blacklist">🚫 黑名单</div>
      <div class="tab" data-tab="logs">📝 日志</div>
    </div>

    
    <!-- 状态页 -->
    <div class="content tab-content active" id="tab-status">
      <div class="status-card">
        <div class="status-item">
          <span class="status-label">🍪 Cookie状态</span>
          <span class="status-value" id="cookieStatus">检查中...</span>
        </div>
        <div class="status-item">
          <span class="status-label">📋 淡出歌单</span>
          <span class="status-value" id="playlistStatus">检查中...</span>
        </div>
        <div class="status-item">
          <span class="status-label">❤️ 喜欢列表缓存</span>
          <span class="status-value" id="favoriteStatus">检查中...</span>
        </div>
        <div class="status-item">
          <span class="status-label">🚫 黑名单数量</span>
          <span class="status-value" id="blacklistCount">0</span>
        </div>
      </div>
      <!-- 开关控件 -->
      <!-- <div class="switch-item">
        <div>
          <div class="switch-label">🔄 二次跳过移除</div>
          <div class="switch-desc">dislike when secondly skip same song</div>
        </div>
        <label class="switch">
          <input type="checkbox" id="triggerSecondSkip">
          <span class="slider"></span>
        </label>
      </div> -->
          
      <button class="action-btn primary" id="refreshStatusBtn">🔄 刷新状态</button>
      <button class="action-btn" id="openNeteaseBtn">🌐 打开网易云音乐</button>
    </div>
    
    <!-- 黑名单页 -->
    <div class="content tab-content" id="tab-blacklist">
      <div class="add-section">
        <input type="text" id="artistInput" placeholder="输入歌手名称，如：周杰伦" maxlength="50">
        <button id="addArtistBtn">添加</button>
      </div>
      
      <div class="blacklist-list" id="blacklistContainer">
        <div class="empty-tip">暂无黑名单歌手</div>
      </div>
      
      <button class="action-btn" id="clearBlacklistBtn">清空所有黑名单</button>
    </div>
    
    <!-- 日志页 -->
    <div class="content tab-content" id="tab-logs">
      <div class="log-list" id="logList">
        <div class="log-item">暂无日志</div>
      </div>
      <button class="action-btn" id="clearLogsBtn">清除日志</button>
    </div>
    
    <div class="footer">
      跳过进度 < 50% 的歌曲自动加入淡出歌单
    </div>
  </div>
  
  <script src="popup.js"></script>
</body>
</html>
